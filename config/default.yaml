# NV Maser Digital Twin — default configuration
# Override any value and pass with: python -m nv_maser train --config config/default.yaml

grid:
  size: 64
  physical_extent_mm: 10.0
  active_zone_fraction: 0.6

field:
  b0_tesla: 0.05
  b0_gradient_ppm_per_mm: 0.0

halbach:
  enabled: false                # set true to use multipole Halbach model
  num_segments: 8               # discrete magnets (8 common, 16-24 for precision)
  inner_radius_mm: 7.0          # bore radius (> physical_extent_mm / 2)
  outer_radius_mm: 15.0         # outer shell radius
  remanence_tesla: 1.4          # N52 NdFeB Br
  max_multipole_order: 12       # highest harmonic in expansion
  br_tolerance_pct: 1.0         # ±% segment Br variation (grade-sorted)
  angle_tolerance_deg: 0.5      # ±° magnetisation angle error
  position_tolerance_mm: 0.05   # ±mm segment position error
  seed: 42                      # reproducible manufacturing realisation

disturbance:
  num_modes: 5
  max_amplitude_tesla: 0.005
  min_spatial_freq: 0.1   # low-freq sinusoids are well-approximated by gradient harmonics
  max_spatial_freq: 1.5
  temporal_drift_rate: 0.1
  # realistic interference modes (all off by default)
  mains_hum_enabled: false
  mains_hum_frequency_hz: 50.0       # 50 Hz EU/Asia, 60 Hz US/JP
  mains_hum_amplitude_tesla: 1.0e-6  # typical lab: 0.1-10 μT
  transient_enabled: false
  transient_rate_hz: 0.01            # Poisson rate of spikes
  transient_amplitude_tesla: 5.0e-4
  transient_decay_time_s: 0.1
  dc_drift_enabled: false
  dc_drift_rate_tesla_per_s: 1.0e-6
  seed: 42  # fixed seed for reproducible training datasets

coils:
  num_coils: 8
  coil_radius_mm: 6.0
  max_current_amps: 1.0
  field_scale_factor: 0.005  # = max_amplitude_tesla; each coil at 1A can cancel one full-amplitude mode

nv:
  zero_field_splitting_ghz: 2.87
  gamma_e_ghz_per_t: 28.025
  t2_star_us: 1.0             # T2* dephasing time; Γ_h = 1/(π·T2*) ≈ 0.318 MHz
  nv_density_per_cm3: 1.0e+17  # ~0.6 ppm NV concentration
  pump_efficiency: 0.5         # fraction of NVs inverted
  orientation_fraction: 0.25   # 1 of 4 ⟨111⟩ axes resonant with B₀
  t1_ms: 5.0                   # spin-lattice relaxation at room temp
  diamond_thickness_mm: 0.5

maser:
  cavity_q: 10000
  cavity_frequency_ghz: 1.47   # D - γe·B₀ = 2.87 - 28.025×0.05 ≈ 1.47 GHz
  min_gain_budget: 0.5         # maser needs ≥50% of peak gain
  coupling_beta: 0.5           # cavity coupling factor (0.5 = critical)
  q_boost_gain: 0.0            # electronic Q-boost loop gain (0 = off, <1)
  maser_probe_power_dbm: -120.0  # small-signal probe reference (Wang 2024)

feedback:
  sensor_noise_tesla: 1.0e-7   # 100 nT Hall sensor noise (conservative)
  num_sensors: 4               # sparse 2×2 sensor grid in active zone
  sensor_bandwidth_hz: 1000.0  # 1 kHz measurement update rate
  dac_bits: 16                 # 16-bit → 30.5 μA step @ ±1A
  dac_settling_time_us: 10.0   # DAC output settling delay
  coil_inductance_uh: 100.0    # flex polyimide micro-coil
  coil_resistance_ohm: 5.0     # → τ = L/R = 20 μs
  control_loop_period_us: 1000.0  # 1 kHz control loop
  computation_latency_us: 100.0   # NN inference on MCU

cavity:
  mode_volume_cm3: 0.5               # TE011 at ~1.5 GHz in 12 mm bore
  fill_factor: 0.01                  # V_diamond / V_mode

optical_pump:
  laser_power_w: 2.0                 # CW 532 nm pump laser
  laser_wavelength_nm: 532.0         # standard NV pump wavelength
  beam_waist_mm: 1.5                 # 1/e² Gaussian beam radius
  absorption_cross_section_m2: 3.1e-21  # NV⁻ at 532 nm
  quantum_defect_fraction: 0.6       # heat fraction of absorbed power
  spin_t1_ms: 5.0                    # ground-state T₁ at room temp
  n_depth_slices: 1                  # >1 enables depth-resolved Beer-Lambert pump
  pulsed: false                      # true = pulsed pump mode (Long 2025)
  pulse_duration_us: 100.0           # pump ON time per cycle
  pulse_period_us: 1000.0            # pulse repetition period

signal_chain:
  lna_noise_figure_db: 1.0           # room-temp GaAs LNA
  lna_gain_db: 30.0                  # LNA power gain
  physical_temperature_k: 300.0      # room temperature
  detection_bandwidth_hz: 1000.0     # matches shimming control loop
  adc_bits: 14                       # RF ADC resolution
  adc_full_scale_dbm: -10.0          # ADC full-scale input
  insertion_loss_db: 2.0             # cables + connectors + isolator

thermal:
  reference_temperature_c: 25.0      # lab reference temperature
  ambient_temperature_c: 25.0        # operating ambient (ΔT=0 → no thermal shift)
  magnet_tempco_pct_per_c: -0.12     # NdFeB remanence tempco
  t2_star_tempco_exponent: 1.0       # phonon T2* scaling exponent
  cavity_wall_tempco_per_c: 0.004    # copper wall resistivity tempco
  coil_tempco_per_c: 0.004           # copper coil resistivity tempco
  thermal_drift_rate_c_per_s: 0.01   # slow environmental drift
  thermal_noise_std_c: 0.1           # thermal fluctuation noise σ
  external_heat_w: 0.0               # pump heat into diamond (closes pump→thermal loop)
  thermal_resistance_c_per_w: 5.0    # diamond → heat sink (°C/W)

model:
  architecture: cnn       # cnn | mlp | lstm
  cnn_channels: [16, 32, 64]
  cnn_kernel_size: 3
  mlp_hidden_dims: [512, 256, 128]
  lstm_hidden_size: 256
  lstm_num_layers: 2
  dropout: 0.1
  activation: relu        # relu | gelu | silu

training:
  num_samples: 10000
  batch_size: 64
  epochs: 50
  learning_rate: 0.001
  lr_scheduler: cosine    # cosine | step | none
  lr_step_size: 15
  lr_gamma: 0.5
  weight_decay: 1.0e-5
  val_split: 0.1
  checkpoint_dir: checkpoints/
  early_stopping_patience: 20
  current_penalty_weight: 1.0e-6  # << field_scale_factor^2 so penalty never dominates
  auto_export_onnx: false
  onnx_export_path: "checkpoints/model.onnx"

viz:
  update_interval_ms: 50
  colormap: RdBu_r
  show_coil_positions: true
  field_range_tesla: [0.045, 0.055]

calibration:
  calibration_dir: ""          # path to nv-maser-hardware/calibration/ (empty = not yet available)
  active_radius_mm: 3.0        # active zone radius for uniformity ppm metric
  reference_map_path: ""       # .npz FieldMap to use as training reference (empty = simulation-generated)

# Advanced physics sections use their config.py defaults unless overridden here:
#   maxwell_bloch, spectral, dipolar, susceptibility,
#   single_sided_magnet, surface_coil, depth_profile
# Unknown keys are rejected (extra="forbid"), so typos fail loudly.

device: auto
